assert_lefthook_installed: true

commit-msg:
  piped: true
  commands:
    commitlint:
      priority: 1
      run: pnpm exec commitlint --edit {1}
    format:
      priority: 2
      glob: '**/*.{js,mjs,cjs,ts,tsx,json,yaml,yml,md,mdx,css,scss,html,astro}'
      run: pnpm exec prettier --write {staged_files}
    lint:
      priority: 3
      glob: '{packages}/**/*.{ts,tsx}'
      run: pnpm exec oxlint --fix {staged_files}
    typecheck:
      priority: 4
      glob: '{packages,examples}/**/*.{ts,tsx}'
      run: pnpm run typecheck

pre-push:
  piped: true
  commands:
    format:
      priority: 1
      glob: '**/*.{js,mjs,cjs,ts,tsx,json,yaml,yml,md,mdx,css,scss,html,astro}'
      run: pnpm exec prettier --check {push_files}
    lint:
      priority: 2
      glob: '{packages}/**/*.{ts,tsx}'
      run: pnpm exec oxlint {push_files}
    typecheck:
      priority: 3
      glob: '{packages,examples}/**/*.{ts,tsx}'
      run: pnpm run typecheck
