assert_lefthook_installed: true

commit-msg:
  piped: true
  commands:
    commitlint:
      priority: 1
      run: pnpm exec commitlint --edit {1}
    format:
      priority: 2
      run: pnpm run format
    lint:
      priority: 3
      glob: "{scripts,packages,examples}/**"
      run: pnpm run lint:fix
    typecheck:
      priority: 4
      glob: "{packages,examples}/**/*.{ts,tsx}"
      run: pnpm run typecheck

pre-push:
  piped: true
  commands:
    format:
      priority: 1
      run: pnpm run format:check
    lint:
      priority: 2
      glob: "{scripts,packages,examples}/**"
      run: pnpm run lint
    typecheck:
      priority: 3
      glob: "{packages,examples}/**/*.{ts,tsx}"
      run: pnpm run typecheck
